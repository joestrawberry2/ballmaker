<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BallMaker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --panel: #11111a;
    --border: #1e1e30;
    --accent: #c8ff00;
    --accent2: #ff4fd8;
    --text: #e8e8f0;
    --muted: #55556a;
    --bottom-h: 84px;
    --header-h: 48px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    display: flex;
    align-items: center;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    gap: 10px;
    z-index: 20;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite; flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.6);} }

  #settings-btn {
    margin-left: auto;
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: border-color .2s, color .2s; flex-shrink: 0;
  }
  #settings-btn.open { border-color: var(--accent); color: var(--accent); }

  /* ── Canvas ── */
  #canvas-wrap {
    position: fixed;
    top: var(--header-h); left: 0; right: 0; bottom: var(--bottom-h);
    background: radial-gradient(ellipse at 50% 40%, #1a1a2e 0%, #0a0a0f 70%);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  #canvas-wrap canvas { display: block; touch-action: none; cursor: grab; }
  #canvas-wrap canvas:active { cursor: grabbing; }

  #hint {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
    pointer-events: none; transition: opacity .5s; white-space: nowrap;
  }

  /* ── Drawer ── */
  #drawer {
    position: fixed;
    top: var(--header-h); right: 0;
    width: min(280px, 88vw);
    bottom: var(--bottom-h);
    background: var(--panel);
    border-left: 1px solid var(--border);
    z-index: 15;
    transform: translateX(101%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    overflow-y: auto;
    padding: 20px 14px;
    display: flex; flex-direction: column; gap: 20px;
  }
  #drawer.open { transform: translateX(0); }

  .section-label {
    font-size: 9px; letter-spacing: 3px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px;
  }

  #tex-preview {
    display: none; border-radius: 4px; overflow: hidden;
    border: 1px solid var(--border); position: relative; margin-top: 8px;
  }
  #tex-preview img { width: 100%; display: block; }
  #tex-label {
    position: absolute; bottom:0; left:0; right:0;
    background: rgba(0,0,0,.7); font-size: 9px; color: var(--muted);
    padding: 4px 8px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
  }

  .color-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .color-swatch {
    width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: border-color .15s, transform .15s;
  }
  .color-swatch:hover,.color-swatch.active { border-color:#fff; transform:scale(1.2); }

  .control-row { display: flex; flex-direction: column; gap: 6px; }
  .control-row label {
    font-size: 10px; color: var(--muted); letter-spacing: 1px;
    display: flex; justify-content: space-between;
  }
  .control-row label span { color: var(--accent); }

  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 2px;
    background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 6px var(--accent); cursor: pointer;
  }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; }
  .toggle-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .toggle {
    width: 38px; height: 22px; background: var(--border);
    border-radius: 11px; position: relative; cursor: pointer; transition: background .2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content:''; position: absolute; top: 4px; left: 4px;
    width: 14px; height: 14px; border-radius: 50%;
    background: #fff; transition: left .2s;
  }
  .toggle.on::after { left: 20px; }

  .divider { height: 1px; background: var(--border); flex-shrink: 0; }

  #reset-btn {
    width: 100%; padding: 10px; background: transparent;
    border: 1px solid var(--border); border-radius: 4px;
    color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: all .2s;
  }
  #reset-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Bottom bar ── */
  #bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--bottom-h);
    background: var(--panel); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    padding: 0 16px; gap: 12px; z-index: 20;
  }

  #upload-btn {
    flex: 1; max-width: 340px; height: 52px;
    border: 1.5px dashed var(--border); border-radius: 14px;
    background: transparent; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1.5px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: border-color .2s, background .2s, color .2s;
    -webkit-tap-highlight-color: transparent;
  }
  #upload-btn:hover, #upload-btn:active {
    border-color: var(--accent); background: rgba(200,255,0,.05); color: var(--accent);
  }
  #upload-btn .ico { font-size: 20px; }

  #file-input { display: none; }

  #tex-pill {
    display: none; align-items: center; gap: 6px;
    background: rgba(200,255,0,.08); border: 1px solid rgba(200,255,0,.25);
    border-radius: 24px; padding: 6px 14px 6px 10px;
    font-size: 10px; color: var(--accent); letter-spacing: 1px;
    max-width: 200px;
  }
  #tex-pill-name { text-overflow: ellipsis; overflow: hidden; white-space: nowrap; flex: 1; }
  #tex-pill-x { cursor: pointer; opacity: .6; flex-shrink: 0; font-size: 14px; line-height:1; }
  #tex-pill-x:hover { opacity: 1; }

  #pause-btn {
    width: 52px; height: 52px; flex-shrink: 0;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color .2s, color .2s, background .2s;
    -webkit-tap-highlight-color: transparent;
  }
  #pause-btn.paused {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(255,79,216,.08);
  }
  #pause-btn:not(.paused):hover, #pause-btn:not(.paused):active {
    border-color: var(--muted);
    color: var(--text);
  }
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>BallMaker</h1>
  <button id="settings-btn">⚙</button>
</header>

<div id="canvas-wrap">
  <canvas id="gl"></canvas>
  <div id="hint">DRAG TO ROTATE · PINCH TO ZOOM</div>
</div>

<!-- Settings drawer -->
<div id="drawer">
  <div>
    <div class="section-label">Ball Color</div>
    <div class="color-row" id="color-swatches">
      <div class="color-swatch active" style="background:#ffffff" data-color="#ffffff"></div>
      <div class="color-swatch" style="background:#c8ff00" data-color="#c8ff00"></div>
      <div class="color-swatch" style="background:#ff4fd8" data-color="#ff4fd8"></div>
      <div class="color-swatch" style="background:#4fc3f7" data-color="#4fc3f7"></div>
      <div class="color-swatch" style="background:#ff6b35" data-color="#ff6b35"></div>
      <div class="color-swatch" style="background:#ffd700" data-color="#ffd700"></div>
      <div class="color-swatch" style="background:#69ff94" data-color="#69ff94"></div>
      <div class="color-swatch" style="background:#b388ff" data-color="#b388ff"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="section-label">Loaded Texture</div>
    <div id="no-tex-msg" style="font-size:10px;color:var(--muted)">No texture loaded.</div>
    <div id="tex-preview">
      <img id="tex-img" src="" alt="">
      <div id="tex-label"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="section-label">Material</div>
    <div class="control-row" style="margin-bottom:14px">
      <label>Roughness <span id="rough-val">0.4</span></label>
      <input type="range" id="rough" min="0" max="100" value="40">
    </div>
    <div class="control-row" style="margin-bottom:14px">
      <label>Metalness <span id="metal-val">0.1</span></label>
      <input type="range" id="metal" min="0" max="100" value="10">
    </div>
    <div class="control-row">
      <label>Ball Size <span id="size-val">1.0</span></label>
      <input type="range" id="ball-size" min="40" max="160" value="100">
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="section-label">Options</div>
    <div class="toggle-row" style="margin-bottom:14px">
      <span class="toggle-label">Auto-rotate</span>
      <div class="toggle on" id="auto-rot"></div>
    </div>
    <div class="toggle-row" style="margin-bottom:14px">
      <span class="toggle-label">Wireframe</span>
      <div class="toggle" id="wire-tog"></div>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Pause</span>
      <div class="toggle" id="pause-tog"></div>
    </div>
  </div>

  <div class="divider"></div>
  <button id="reset-btn">↺ Reset Texture</button>
</div>

<!-- Bottom upload bar -->
<div id="bottom-bar">
  <button id="pause-btn" title="Pause">⏸</button>
  <button id="upload-btn">
    <span class="ico">📷</span>
    <span>TAP TO LOAD TEXTURE</span>
  </button>
  <div id="tex-pill">
    <span>🖼</span>
    <span id="tex-pill-name"></span>
    <span id="tex-pill-x">✕</span>
  </div>
  <input type="file" id="file-input" accept="image/*">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  const canvas = document.getElementById('gl');
  const wrap   = document.getElementById('canvas-wrap');

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a0f, 0.08);
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  camera.position.set(0, 0, 3.5);

  scene.add(new THREE.AmbientLight(0xffffff, 0.3));
  const key = new THREE.DirectionalLight(0xffffff, 1.5);
  key.position.set(5,5,5); key.castShadow = true; scene.add(key);
  const fill = new THREE.DirectionalLight(0x4fc3f7, 0.4);
  fill.position.set(-5,0,-3); scene.add(fill);
  const rim = new THREE.DirectionalLight(0xc8ff00, 0.6);
  rim.position.set(0,-5,-5); scene.add(rim);

  const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, metalness: 0.1 });
  const ball = new THREE.Mesh(new THREE.SphereGeometry(1, 128, 128), mat);
  ball.castShadow = ball.receiveShadow = true;
  scene.add(ball);

  const sp = new THREE.Mesh(new THREE.PlaneGeometry(10,10), new THREE.ShadowMaterial({opacity:.2}));
  sp.rotation.x = -Math.PI/2; sp.position.y = -1.3; sp.receiveShadow = true;
  scene.add(sp);

  function resize() {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  let drag = false, rotX = 0, rotY = 0, velX = 0, velY = 0, lastX = 0, lastY = 0;

  wrap.addEventListener('mousedown', e => { drag=true; lastX=e.clientX; lastY=e.clientY; velX=velY=0; });
  window.addEventListener('mouseup', () => { drag=false; });
  window.addEventListener('mousemove', e => {
    if (!drag) return;
    velX=(e.clientY-lastY)*.008; velY=(e.clientX-lastX)*.008;
    rotX+=velX; rotY+=velY; lastX=e.clientX; lastY=e.clientY;
  });

  let tX=0, tY=0, pinch0=0, camZ0=3.5;
  wrap.addEventListener('touchstart', e => {
    if (e.touches.length===1) {
      drag=true; tX=e.touches[0].clientX; tY=e.touches[0].clientY; velX=velY=0;
    } else if (e.touches.length===2) {
      drag=false;
      pinch0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      camZ0=camera.position.z;
    }
  },{passive:true});
  wrap.addEventListener('touchend', ()=>{drag=false;},{passive:true});
  wrap.addEventListener('touchmove', e=>{
    e.preventDefault();
    if (e.touches.length===1 && drag) {
      velX=(e.touches[0].clientY-tY)*.008; velY=(e.touches[0].clientX-tX)*.008;
      rotX+=velX; rotY+=velY; tX=e.touches[0].clientX; tY=e.touches[0].clientY;
    } else if (e.touches.length===2) {
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      camera.position.z=Math.min(6,Math.max(1.5,camZ0*(pinch0/d)));
    }
  },{passive:false});
  wrap.addEventListener('wheel', e=>{
    camera.position.z=Math.min(6,Math.max(1.5,camera.position.z+e.deltaY*.003));
  });

  let autoRotate=true, wireframe=false, userTexture=null, currentColor='#ffffff', paused=false;

  function animate() {
    requestAnimationFrame(animate);
    if (paused) return;
    if (drag){velX*=.85;velY*=.85;}
    else {rotX+=velX;rotY+=velY;velX*=.95;velY*=.95;if(autoRotate)rotY+=.004;}
    ball.rotation.x=rotX; ball.rotation.y=rotY;
    renderer.render(scene,camera);
  }
  animate();

  setTimeout(()=>{const h=document.getElementById('hint');if(h){h.style.opacity='0';setTimeout(()=>h.remove(),500);}},3500);

  function applyTexture(src, name) {
    new THREE.TextureLoader().load(src, tex => {
      tex.encoding=THREE.sRGBEncoding;
      tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
      if(userTexture) userTexture.dispose();
      userTexture=tex; mat.map=tex; mat.color.set(0xffffff); mat.needsUpdate=true;

      document.getElementById('tex-img').src=src;
      document.getElementById('tex-label').textContent=name||'texture';
      document.getElementById('tex-preview').style.display='block';
      document.getElementById('no-tex-msg').style.display='none';

      document.getElementById('tex-pill-name').textContent=name||'texture';
      document.getElementById('tex-pill').style.display='flex';
      document.getElementById('upload-btn').style.display='none';
    });
  }

  function resetTexture() {
    if(userTexture){userTexture.dispose();userTexture=null;}
    mat.map=null; mat.color.set(currentColor); mat.needsUpdate=true;
    document.getElementById('tex-preview').style.display='none';
    document.getElementById('tex-img').src='';
    document.getElementById('no-tex-msg').style.display='block';
    document.getElementById('tex-pill').style.display='none';
    document.getElementById('upload-btn').style.display='flex';
  }

  const fileInput=document.getElementById('file-input');
  document.getElementById('upload-btn').addEventListener('click',()=>fileInput.click());
  fileInput.addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    applyTexture(URL.createObjectURL(f), f.name);
    fileInput.value='';
  });
  document.getElementById('tex-pill-x').addEventListener('click', resetTexture);
  document.getElementById('reset-btn').addEventListener('click', resetTexture);

  document.querySelectorAll('.color-swatch').forEach(sw=>{
    sw.addEventListener('click',()=>{
      document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
      sw.classList.add('active');
      currentColor=sw.dataset.color; mat.color.set(currentColor); mat.needsUpdate=true;
    });
  });

  document.getElementById('rough').addEventListener('input',e=>{
    const v=+e.target.value/100;
    document.getElementById('rough-val').textContent=v.toFixed(1);
    mat.roughness=v; mat.needsUpdate=true;
  });
  document.getElementById('metal').addEventListener('input',e=>{
    const v=+e.target.value/100;
    document.getElementById('metal-val').textContent=v.toFixed(1);
    mat.metalness=v; mat.needsUpdate=true;
  });
  document.getElementById('ball-size').addEventListener('input',e=>{
    const v=+e.target.value/100;
    document.getElementById('size-val').textContent=v.toFixed(1);
    ball.scale.setScalar(v);
  });

  document.getElementById('auto-rot').addEventListener('click',function(){
    autoRotate=!autoRotate; this.classList.toggle('on',autoRotate);
  });
  document.getElementById('wire-tog').addEventListener('click',function(){
    wireframe=!wireframe; this.classList.toggle('on',wireframe);
    mat.wireframe=wireframe; mat.needsUpdate=true;
  });
  document.getElementById('pause-tog').addEventListener('click',function(){
    paused=!paused; this.classList.toggle('on',paused);
    const btn=document.getElementById('pause-btn');
    btn.classList.toggle('paused',paused);
    btn.textContent=paused?'▶':'⏸';
    if (!paused) renderer.render(scene,camera);
  });
  document.getElementById('pause-btn').addEventListener('click',function(){
    paused=!paused;
    this.classList.toggle('paused',paused);
    this.textContent=paused?'▶':'⏸';
    const tog=document.getElementById('pause-tog');
    tog.classList.toggle('on',paused);
    if (!paused) renderer.render(scene,camera);
  });

  const drawer=document.getElementById('drawer');
  const settBtn=document.getElementById('settings-btn');
  settBtn.addEventListener('click',()=>{
    drawer.classList.toggle('open'); settBtn.classList.toggle('open');
  });
  wrap.addEventListener('touchstart',()=>{
    drawer.classList.remove('open'); settBtn.classList.remove('open');
  },{passive:true});
})();
</script>
</body>
</html>
